server {
    listen      8080;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # Reduce hop noise + don't leak nginx version.
    server_tokens off;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain
                    text/css
                    text/javascript
                    application/javascript
                    application/json
                    image/svg+xml;

    # Hashed assets — safe to cache forever.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA shell must never be cached so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store" always;
        try_files  $uri =404;
    }

    # API → backend service over the compose network.
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback — preserve client routes on hard reload.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
